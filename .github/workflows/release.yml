name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./... -v -count=1

  release:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine next version
        id: version
        run: |
          # Get latest tag, default to v0.0.0 if none exists
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST"

          # Auto-bump patch version
          MAJOR=$(echo "$LATEST" | cut -d. -f1)
          MINOR=$(echo "$LATEST" | cut -d. -f2)
          PATCH=$(echo "$LATEST" | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          # Check commit messages since last tag for bump signals
          COMMITS=$(git log "${LATEST}..HEAD" --pretty=%s 2>/dev/null || git log --pretty=%s)
          if echo "$COMMITS" | grep -qiE "^feat!|BREAKING CHANGE"; then
            NEXT_MINOR=$((${MINOR#v} + 1))
            NEXT="${MAJOR}.${NEXT_MINOR}.0"
          elif echo "$COMMITS" | grep -qiE "^feat"; then
            NEXT_MINOR=$((${MINOR#v} + 1))
            NEXT="${MAJOR}.${NEXT_MINOR}.0"
          fi

          echo "next=$NEXT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Check if release needed
        id: check
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          if [ "$LATEST" = "${{ steps.version.outputs.next }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            # Check if any commits since last tag
            if [ "$LATEST" != "none" ] && [ -z "$(git log ${LATEST}..HEAD --oneline)" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create tag
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.next }}" -m "Release ${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

      - name: Import GPG key
        if: steps.check.outputs.skip != 'true'
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Run GoReleaser
        if: steps.check.outputs.skip != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
